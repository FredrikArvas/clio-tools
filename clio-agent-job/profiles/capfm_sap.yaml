# CapFM — Rekryterarprofil för senior SAP-utvecklare
# profile_type: recruiter (letar EFTER kandidater, inte ett jobb)
# Genererad 2026-04-15

name: CapFM SAP-rekrytering
email: fredrik.arvas@capgemini.com   # Rapport till rekryteraren
language: sv

profile_type: recruiter   # Styr vilken prompt-mall som används

# VAD VI SÖKER
target_candidate:
  role: Senior SAP-utvecklare / SAP-arkitekt
  seniority: Senior (10+ år)
  characteristics:
    - Lång erfarenhet av on-premise SAP (ECC, R/3, äldre versioner)
    - Pre-cloud arbetssätt — van vid hierarkiska, processdrivna organisationer
    - Sannolikt inte aktivt jobbsökande (men öppen om rätt signal uppstår)
    - Troligen 45-60 år, djup domänkunskap inom specifik bransch
  avoid:
    - SAP-konsulter på öppna marknaden (redan tillgängliga)
    - S/4HANA-specialister med cloud-first bakgrund

# SIGNALER SOM GÖR SAP-UTVECKLARE ÖPPNA FÖR BYTE
# (om 6 månader — inte imorgon)
trigger_signals:
  high_value:
    - Företag migrerar från SAP till annan plattform (Salesforce, Oracle, D365)
    - Varsel eller strukturomvandling på känd SAP-tung arbetsgivare
    - Outsourcing av IT-avdelning på storbolag (SAP-folk förlorar intern roll)
    - S/4HANA-tvångsmigration annonseras — äldre SAP-devs ser handskriften på väggen
    - Storbolag lägger ned intern IT och köper SaaS istället
  medium_value:
    - Förvärv där moderbolag använder annan plattform än SAP
    - CIO/IT-chef byts ut på SAP-tung organisation
    - Besparingspaket inom IT på känd SAP-arbetsgivare

# BRANSCHER MED MÅNGA SAP-TUNGA ORGANISATIONER
target_industries:
  - Fordon (Volvo, Scania, Autoliv)
  - Telekom (Ericsson, Telia)
  - Tillverkning (SKF, Sandvik, ABB)
  - Detaljhandel (ICA, Coop, H&M)
  - Offentlig sektor (myndigheter med äldre SAP-installationer)
  - Bank och försäkring (Nordea, Handelsbanken, If)

# Konfidentiell kund — nämns inte i rapporten
confidential_client: true
client_hint: "Hierarkisk organisation, ej namnges"
