version: 1

# clio-agent-obit källregistry
# Lägg till nya källor här eller via: python sources/discover.py probe <url> --add NAMN
# Sätt enabled: false för att tysta en källa utan att ta bort den.

sources:
  - name: familjesidan-stockholm
    enabled: true
    adapter: source_familjesidan_html.FamiljesidanHtmlSource
    config:
      base_url: https://www.familjesidan.se
      newspapers:
        - 461   # Stockholms-region (verifiera mot live)

  - name: fonus-national
    enabled: true
    adapter: source_fonus.FonusSource
    config:
      url: https://minnessidor.fonus.se/
