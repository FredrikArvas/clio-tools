# nicknames.yaml — Swedish nickname and name variant map for clio-agent-obit matcher
#
# Format: canonical_name: [variants]
# All entries lowercase. Diacritics handled separately in matcher.py (NFD normalize).
#
# Extend this file when new variants appear in real announcements.
# Commit the change with a note about the source (e.g. "seen in Familjesidan 2026-04").
#
# Used for fuzzy first-name matching (+25 points for nickname map hit).

