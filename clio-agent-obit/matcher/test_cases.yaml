# test_cases.yaml — Acceptance test cases for clio-agent-obit Sprint 2
#
# Run with: python test_runner.py
# All 5 cases must pass for sprint acceptance gate.
#
# Test types:
#   unit        — synthetic announcement, no network required
#   gedcom      — requires GEDCOM file (path in test_runner.py or --gedcom flag)
#   online      — requires live network access to Familjesidan (skipped unless --online)

- id: TC-01
  name: "Göran Frisk — regression, exact match"
  type: unit
  description: >
    Baseline regression. Göran Frisk, 1945, Haninge, priority 'viktig'.
    Synthetic announcement with exact name + birth year + city.
    Must score >= 90 and be notifiable.
  watchlist_entry:
    fornamn: Göran
    efternamn: Frisk
    fodelsear: 1945
    hemort: Haninge
    prioritet: viktig
  announcement:
    namn: "Göran Frisk"
    fodelsear: 1945
    hemort: Haninge
    url: "https://test.example/goran-frisk"
    publiceringsdatum: "2026-04-08"
  expect:
    score_min: 90
    notifiable: true

- id: TC-02
  name: "Göran Gullberg — recent miss via backfill"
  type: online
  description: >
    Göran Gullberg, born 1946-09-21, Täby. Died approximately March 2026.
    Should be found via --backfill when scanning Familjesidan archive.
    Announcement published within 180-day window → should generate notification.
  watchlist_entry:
    fornamn: Göran
    efternamn: Gullberg
    fodelsear: 1946
    hemort: Täby
    prioritet: normal
  expect:
    found_via_backfill: true
    within_suppression_window: true
    notifiable: true

- id: TC-03
  name: "Per Nydahl — older post, suppressed"
  type: online
  description: >
    Per Nydahl, approximately 1935, Nacka. Died 2025 (>180 days ago from 2026-04-09).
    Should be found via backfill but NOT generate notification (first-run suppression).
    Must appear on screen / in --show-all-matches output.
  watchlist_entry:
    fornamn: Per
    efternamn: Nydahl
    fodelsear_approx: 1935   # birth year approximate ±10 years
    hemort: Nacka
    prioritet: normal
  expect:
    found_via_backfill: true
    within_suppression_window: false
    notifiable: false
    visible_in_show_all_matches: true

- id: TC-04
  name: "Stig Arvas — GEDCOM data verification"
  type: gedcom
  description: >
    Verify that Stig Arvas (born 1944, Fredrik's father) is present in partnerdb
    after GEDCOM import, with at least: name claim, birth event, relationship to Fredrik.
    Note: Helena Thustrup (1946, Fredrik's mother) is correctly absent from the watch list
    — she is marked deceased=True in the GEDCOM and filtered out by _is_likely_alive().
    GEDCOM file: UlrikasFredriks_v2010-09-22 - 22092010.ged
  gedcom_verify_query: "Stig Arvas"
  expect:
    has_name_claim: true
    has_birth_event: true
    has_relationships: true

- id: TC-05
  name: "Roger Jansson — fuzzy match via nickname/Levenshtein"
  type: unit
  description: >
    Roger Jansson, approximately 1950, Haninge.
    Announcements may spell first name as 'Rogge', 'Rodger', or 'roger'.
    Announcement with 'Rogge Jansson' must still score >= 60 (notifiable).
    Announcement with exact 'Roger Jansson' must score higher than fuzzy variant.
  watchlist_entry:
    fornamn: Roger
    efternamn: Jansson
    fodelsear_approx: 1950
    hemort: Haninge
    prioritet: normal
  announcements:
    - namn: "Roger Jansson"
      fodelsear: 1951
      hemort: Haninge
      expect_score_min: 90
      expect_notifiable: true
    - namn: "Rogge Jansson"
      fodelsear: null
      hemort: null
      expect_score_min: 60
      expect_notifiable: true
    - namn: "Rodger Jansson"
      fodelsear: null
      hemort: null
      expect_score_min: 60
      expect_notifiable: true
