version: 1

# Icke-hemlig konfiguration. Lösenord ligger i .env (se password_env nedan).
# Konvention: config här, hemligheter i .env. Aldrig blanda ihop.

smtp:
  host: mail.arvas.international
  port: 465
  use_ssl: true            # SSL från start (port 465). Sätt false + use_starttls: true för 587.
  use_starttls: false
  user: clio@arvas.international
  password_env: SMTP_PASSWORD   # Nyckelnamnet i .env där lösenordet hämtas

notify:
  to: fredrik@arvas.se          # Fallback om watchlist-filnamnet inte är en giltig e-post
  from_label: clio-agent-obit

# Sprint 3 — auto-import av returnerade bevakningslistor via clio-agent-mail
# Säkerhet: [clio-obit]-mail accepteras BARA från adresser i denna lista.
# Även om en adress är vitlistad i clio-agent-mail måste den finnas här.
obit_import:
  whitelist:
    - ulrika@arvas.se
    - fredrik@arvas.se
